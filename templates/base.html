{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="csrf-token" content="{{ csrf_token }}">
    <title>{% block title %}Hardware Shop | Intelligent Chatbot{% endblock %}</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <!-- Material Symbols -->
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
    {% block extra_css %}{% endblock %}
</head>
<body class="blueprint-pattern">

    <!-- Navigation -->
    <nav>
        <div class="nav-content">
            <a href="{% url 'home' %}" class="logo">
                <span class="logo-dot"></span>
                Hardware Shop
            </a>

            <div class="nav-links">
                <a href="{% url 'home' %}"     class="nav-link {% if request.resolver_match.url_name == 'home' %}active{% endif %}">Home</a>
                <a href="{% url 'products' %}" class="nav-link {% if request.resolver_match.url_name == 'products' %}active{% endif %}">Products</a>
                <a href="{% url 'orders' %}"   class="nav-link {% if request.resolver_match.url_name == 'orders' %}active{% endif %}">Orders</a>
                <a href="{% url 'contact' %}"  class="nav-link {% if request.resolver_match.url_name == 'contact' %}active{% endif %}">Contact</a>
            </div>

            <div class="nav-actions">
                <a href="{% url 'orders' %}" class="nav-icon-btn" title="Orders">
                    <span class="material-symbols-outlined">shopping_cart</span>
                </a>
                <button class="nav-icon-btn" title="Account">
                    <span class="material-symbols-outlined">account_circle</span>
                </button>
            </div>
        </div>
    </nav>

    <main>
        {% block content %}{% endblock %}
    </main>

    <!-- Side Panel (Buy Flow) -->
    <div class="overlay" id="overlay"></div>
    <aside class="side-panel" id="side-panel">
        <div class="panel-header">
            <h2>Your Order</h2>
            <button class="btn btn-ghost" id="close-panel" title="Close">
                <span class="material-symbols-outlined">close</span>
            </button>
        </div>
        <div class="panel-content" id="panel-content">
            <!-- Injected by JS -->
        </div>
        <div class="panel-footer" id="panel-footer">
            <!-- Injected by JS -->
        </div>
    </aside>

    <!-- main.js MUST load before page-specific scripts -->
    <script src="{% static 'js/main.js' %}"></script>
    {% block extra_js %}{% endblock %}
</body>
</html>
